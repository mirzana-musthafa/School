<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ICT Workbook</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f6ff;
            margin: 0;
            padding: 0;
        }

        header {
            background: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
        }

        h1 {
            margin: 0;
        }

        .container {
            padding: 20px;
            text-align: center;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-decoration: none;
            color: #2c3e50;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            transition: 0.3s;
            font-weight: bold;
        }

        .card:hover {
            background: #3498db;
            color: white;
            transform: scale(1.05);
        }

        footer {
            margin-top: 30px;
            padding: 10px;
            text-align: center;
            background: #2c3e50;
            color: white;
        }
    </style>
</head>
