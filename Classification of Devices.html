<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Devices Classification Activity</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #eef2f7;
    margin: 0;
    padding: 10px;
}

h2 {
    margin-top: 10px;
}

#timer {
    font-size: 22px;
    margin: 10px;
    font-weight: bold;
}

#message {
    font-size: 22px;
    color: green;
    margin: 10px;
}

button {
    padding: 10px 20px;
    margin: 5px;
    font-size: 16px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    opacity: 0.8;
}

.devices {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 10px;
}

.device {
    width: 120px;
    margin: 8px;
    padding: 8px;
    background: white;
    border-radius: 12px;
    border: 1px solid #ccc;
    font-size: 14px;
    cursor: pointer;
    user-select: none;
}

.device img {
    width: 60px;
}

.categories {
    display: flex;
    justify-content: space-around;
    flex-wrap: wrap;
    margin-top: 20px;
}

.circle {
    width: 240px;
    height: 240px;
    border-radius: 50%;
    border: 3px dashed #555;
    margin: 15px;
    padding: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 18px;
    background: #fff;
}

.correct {
    background: #c8f7c5 !important;
}

.wrong {
    background: #f7c5c5 !important;
}
</style>
</head>

<body>

<h2>Computer Devices Classification</h2>

<div id="timer">Time: 0 s</div>
<div id="message"></div>

<button onclick="startGame()" style="background:#2ecc71;color:white;">Start</button>
<button onclick="checkAnswers()" style="background:#3498db;color:white;">Check</button>
<button onclick="resetGame()" style="background:#e74c3c;color:white;">Reset</button>

<div class="devices" id="devices"></div>

<div class="categories">
    <div class="circle" data-type="input">Input Devices</div>
    <div class="circle" data-type="output">Output Devices</div>
    <div class="circle" data-type="storage">Storage Devices</div>
    <div class="circle" data-type="network">Network Devices</div>
</div>

<audio id="correctSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script>

const devicesData = [
{ name:"Mouse", img:"https://img.icons8.com/color/96/mouse.png", type:"input" },
{ name:"Keyboard", img:"https://img.icons8.com/color/96/keyboard.png", type:"input" },
{ name:"Scanner", img:"https://img.icons8.com/color/96/scanner.png", type:"input" },
{ name:"Joystick", img:"https://img.icons8.com/color/96/joystick.png", type:"input" },
{ name:"Microphone", img:"https://img.icons8.com/color/96/microphone.png", type:"input" },

{ name:"Monitor", img:"https://img.icons8.com/color/96/monitor.png", type:"output" },
{ name:"Speaker", img:"https://img.icons8.com/color/96/speaker.png", type:"output" },
{ name:"Printer", img:"https://classroomclipart.com/image/static2/preview2/computer-inkjet-printer-24316.jpg", type:"output" },
{ name:"Projector", img:"https://clipart-library.com/8300/2368/movie-projector-clipart-illustration_251822-519.jpg", type:"output" },

{ name:"RAM", img:"https://cdn1.iconfinder.com/data/icons/computer-filled-line/100/computer_ram-512.png", type:"storage" },
{ name:"Hard Disk", img:"https://img.icons8.com/color/96/hdd.png", type:"storage" },
{ name:"SSD", img:"https://img.icons8.com/color/96/ssd.png", type:"storage" },
{ name:"Pendrive", img:"https://img.icons8.com/color/96/usb-memory-stick.png", type:"storage" },
{ name:"CD", img:"https://img.icons8.com/color/96/cd.png", type:"storage" },

{ name:"Router", img:"https://img.icons8.com/color/96/wifi-router.png", type:"network" },
{ name:"Network Switch", img:"https://cdn.vectorstock.com/i/500p/71/95/data-network-switch-cartoon-vector-51117195.jpg", type:"network" },

{ name:"Webcam", img:"https://img.icons8.com/color/96/webcam.png", type:"input" }
];

devicesData.sort(() => Math.random() - 0.5);

let selectedDevice = null;
let seconds = 0;
let timerInterval = null;
let started = false;

// LOAD DEVICES
const container = document.getElementById("devices");

devicesData.forEach(d => {
    const div = document.createElement("div");
    div.className = "device";
    div.dataset.type = d.type;

    div.innerHTML = `<img src="${d.img}"><br>${d.name}`;

    // TOUCH + CLICK SELECT
    div.addEventListener("click", () => {
        if (!started) return;

        document.querySelectorAll(".device").forEach(x => x.style.border = "1px solid #ccc");

        selectedDevice = div;
        div.style.border = "3px solid #3498db";
    });

    container.appendChild(div);
});

// CATEGORY CLICK (DROP)
document.querySelectorAll(".circle").forEach(c => {
    c.addEventListener("click", () => {
        if (!started || !selectedDevice) return;

        c.appendChild(selectedDevice);
        selectedDevice.style.border = "1px solid #ccc";
        selectedDevice = null;
    });
});

// START GAME
function startGame() {
    if (!started) {
        started = true;
        timerInterval = setInterval(() => {
            seconds++;
            document.getElementById("timer").innerText = "Time: " + seconds + " s";
        }, 1000);
    }
}

// CHECK ANSWERS
function checkAnswers() {
    if (!started) return;

    let allCorrect = true;

    document.querySelectorAll(".device").forEach(d => {
        d.classList.remove("correct","wrong");

        let parent = d.parentElement.dataset.type;

        if (parent === d.dataset.type) {
            d.classList.add("correct");
        } else {
            d.classList.add("wrong");
            allCorrect = false;
        }
    });

    if (allCorrect) {
        clearInterval(timerInterval);
        document.getElementById("message").innerText =
        "🎉 Completed in " + seconds + " seconds!";
        document.getElementById("correctSound").play();
    }
}

// RESET
function resetGame() {
    location.reload();
}

</script>

</body>
</html>
